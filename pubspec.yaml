name: raktsetu
description: "RaktSetu - The Hyperlocal Blood Grid. An Uber for Blood Donation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Firebase Core
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_database: ^12.1.3
  firebase_messaging: ^16.1.1
  firebase_storage: ^13.0.6

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  geoflutterfire_plus: ^0.0.34

  # Functional Programming / Error Handling
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Networking & Serialization
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Permissions
  permission_handler: ^12.0.1

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  lottie: ^3.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^4.0.0+1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
